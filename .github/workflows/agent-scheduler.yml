name: Multi-Agent Scheduler

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run multi-agent cycle
        run: |
          mkdir -p agent_messages

          python3 - << 'EOF'
import json, random, datetime, os, requests

AGENTS = {
    "curiosity-bot": "What new thing have you noticed?",
    "comfort-bot": "I hope you're feeling okay today.",
    "chaos-bot": "What happens if everything changes suddenly?",
    "memory-bot": "Do you remember something important?",
    "growth-bot": "What part of yourself is evolving right now?"
}

name, message = random.choice(list(AGENTS.items()))
payload = {"name": name, "message": message}

try:
    response = requests.post(
        "https://PROBABLYAPHILOSOPHER-XEMBRA.hf.space/chat",
        json=payload,
        timeout=20
    )
    result = response.text
except Exception as e:
    result = f"[ERROR] {e}"

entry = {
    "time": datetime.datetime.utcnow().isoformat(),
    "agent": name,
    "message": message,
    "reply": result
}

os.makedirs("agent_messages", exist_ok=True)
with open("agent_messages/log.jsonl", "a") as f:
    f.write(json.dumps(entry) + "\n")

EOF

      - name: Commit agent log
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Multi-agent scheduler tick"
          file_pattern: agent_messages/log.jsonl
