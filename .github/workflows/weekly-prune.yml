name: Weekly Memory Prune

on:
  schedule:
    - cron: "0 4 * * 0"   # every Sunday at 4 AM UTC
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Prune memory logs
        run: |
          mkdir -p creature_saves

          for FILE in creature_saves/*.json; do
            echo "Processing $FILE"

            python3 - << 'EOF'
import json, sys

path = sys.argv[1]

try:
    with open(path, "r", encoding="utf-8") as f:
        data = json.load(f)
except Exception:
    sys.exit(0)

# prune memory_log to last 100 entries
mem = data.get("memory_log", [])
if isinstance(mem, list) and len(mem) > 100:
    data["memory_log"] = mem[-100:]

with open(path, "w", encoding="utf-8") as f:
    json.dump(data, f, indent=2)

EOF
            "$FILE"
          done

      - name: Commit pruned memory
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly memory prune"
          file_pattern: creature_saves/*.json
