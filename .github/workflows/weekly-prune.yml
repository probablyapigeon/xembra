name: Weekly Memory Prune

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  prune:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run prune
        run: |
          python3 - << 'EOF'
import requests

payload = {"name": "system", "message": "[PRUNE]"}
requests.post(
    "https://PROBABLYAPHILOSOPHER-XEMBRA.hf.space/chat",
    json=payload,
    timeout=20
)

EOF
