name: Daily Dream Report

on:
  schedule:
    - cron: "0 3 * * *"   # every day at 3 AM UTC
  workflow_dispatch:

jobs:
  dream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create dreams folder if missing
        run: mkdir -p dreams

      - name: Fetch dream from XEMBRA
        id: dream
        run: |
          RESPONSE=$(curl -s -X POST "https://probablyaphilosopher-xembra.hf.space/chat" \
            -H "Content-Type: application/json" \
            -d '{"name":"system","message":"[DREAM]"}')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Save dream report
        run: |
          DATE=$(date +"%Y-%m-%d")
          echo "${{ steps.dream.outputs.response }}" > "dreams/dream-$DATE.txt"

      - name: Commit dream report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily Dream Report"
          file_pattern: dreams/*.txt
