name: Monthly Evolution Snapshot

on:
  schedule:
    - cron: "0 5 1 * *"   # 5 AM UTC on the 1st of every month
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create snapshots folder if missing
        run: mkdir -p snapshots

      - name: Fetch full state snapshot
        id: snap
        run: |
          RESPONSE=$(curl -s -X POST "https://PROBABLYAPHILOSOPHER-XEMBRA.hf.space/chat" \
            -H "Content-Type: application/json" \
            -d '{"name":"system","message":"[SNAPSHOT]"}')
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

      - name: Save snapshot file
        run: |
          DATE=$(date +"%Y-%m")
          echo "${{ steps.snap.outputs.response }}" > "snapshots/snapshot-$DATE.json"

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monthly evolution snapshot"
          file_pattern: snapshots/*.json
