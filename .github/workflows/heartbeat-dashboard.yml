name: Heartbeat Dashboard

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        run: |
          mkdir -p dashboard

          python3 - << 'EOF'
import json, requests, datetime

payload = {"name": "system", "message": "[DASHBOARD]"}
response = requests.post(
    "https://PROBABLYAPHILOSOPHER-XEMBRA.hf.space/chat",
    json=payload,
    timeout=20
)

html = f"""
<html>
<body>
<h1>XEMBRA Dashboard</h1>
<p>Last update: {datetime.datetime.utcnow().isoformat()}</p>
<pre>{response.text}</pre>
</body>
</html>
"""

with open("dashboard/index.html", "w") as f:
    f.write(html)

EOF

      - name: Commit dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update dashboard"
          file_pattern: dashboard/index.html
